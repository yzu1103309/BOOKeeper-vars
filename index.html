<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BooKeeper Update</title>
  <link rel="icon" href="icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e5e7eb;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      --error: #ef4444; /* 新增錯誤提示顏色 */
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 80vw;
      max-width: 600px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f3f4f6;
      border: 1px solid var(--border);
    }

    .app-title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .version {
      margin: 0 0 24px 8px;
      font-size: 18px;
      color: var(--muted);
    }

    .steps {
      display: grid;
      gap: 18px;
    }

    .step {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      background: #fcfcff;
      text-align: center;
    }

    .step h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    a.button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.15s ease;
    }

    a.button:hover {
      background: var(--primary-hover);
    }

    /* --- 新增：不支援裝置的訊息樣式 --- */
    .not-supported {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: var(--error);
      padding: 20px 0;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 550px) {
      .step {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-align: left;
      }

      .step h2 {
        margin: 0;
      }

      a.button {
        margin-top: 0;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="app-header">
      <img class="app-icon" src="icon.png" alt="BooKeeper icon" />
      <h1 class="app-title">BOOKeeper</h1>
    </div>

    <p class="version" id="versionText">Loading update version...</p>

    <div id="notSupportedMsg" class="not-supported hidden">
      Not Supported on this device
      <br />
      <br />
      Open this page in iOS or Android.
    </div>

    <section class="steps" id="stepsSection">
      <div class="step">
        <h2>Step 1: Install Expo Go</h2>
        <a id="storeLink" class="button hidden" href="#" target="_blank" rel="noopener noreferrer">Install Expo Go</a>
      </div>

      <div class="step">
        <h2>Step 2: Open in Expo</h2>
        <a id="expoLink" class="button hidden" href="#" target="_blank" rel="noopener noreferrer">Open in Expo</a>
      </div>
    </section>
  </main>

  <script>
    const APP_STORE_LINK = 'https://apps.apple.com/app/expo-go/id982107779';
    const PLAY_STORE_LINK = 'https://play.google.com/store/apps/details?id=host.exp.exponent';

    function detectPlatform() {
      const ua = navigator.userAgent || '';
      if (/android/i.test(ua)) {
        return 'android';
      }
      if (/iPhone|iPad|iPod/i.test(ua)) {
        return 'ios';
      }
      return 'unknown';
    }

    function setupStoreLink() {
      const platform = detectPlatform();
      const storeLink = document.getElementById('storeLink');
      const stepsSection = document.getElementById('stepsSection');
      const notSupportedMsg = document.getElementById('notSupportedMsg');

      if (platform === 'android') {
        storeLink.href = PLAY_STORE_LINK;
        storeLink.textContent = 'Open Google Play';
        storeLink.classList.remove('hidden');
        return platform;
      }

      if (platform === 'ios') {
        storeLink.href = APP_STORE_LINK;
        storeLink.textContent = 'Open App Store';
        storeLink.classList.remove('hidden');
        return platform;
      }

      // 當設備不是 iOS 也不是 Android 時
      stepsSection.classList.add('hidden'); // 隱藏步驟區塊
      notSupportedMsg.classList.remove('hidden'); // 顯示不支援訊息
      return platform;
    }

    async function loadVersionInfo() {
      const versionText = document.getElementById('versionText');
      const expoLink = document.getElementById('expoLink');
      const platform = setupStoreLink();

      try {
        const response = await fetch('./latest_version', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Failed to load latest_version');
        }

        const data = await response.json();
        const versionNum = data.version || 'unknown';
        versionText.textContent = `Update version ${versionNum}`;

        // 如果是不支援的平台，其實不需要設定 expoLink，但為了程式碼完整性保留判斷
        if (platform !== 'unknown') {
          let expoUrl = data.android_link || data.ios_link || '';
          if (platform === 'android' && data.android_link) {
            expoUrl = data.android_link;
          } else if (platform === 'ios' && data.ios_link) {
            expoUrl = data.ios_link;
          }

          if (expoUrl) {
            expoLink.href = expoUrl;
            expoLink.classList.remove('hidden');
          }
        }
      } catch (error) {
        versionText.textContent = 'Could not load update version.';
        console.error(error);
      }
    }

    loadVersionInfo();
  </script>
</body>
</html>
